<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>yasashi studio</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5vw;
      letter-spacing: 5px;
      text-transform: uppercase;
    }

    .section {
      padding: 100px 10%;
      border-top: 1px solid #222;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .card {
      background: #111;
      padding: 40px;
      transition: 0.4s;
      cursor: pointer;
    }

    .card:hover {
      background: #fff;
      color: #000;
      transform: translateY(-10px);
    }

    .footer {
      text-align: center;
      padding: 50px;
      opacity: 0.5;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero {
        font-size: 10vw;
      }
    }
  </style>
</head>

<body>

  <div class="hero">
    MAKE / BREAK
  </div>

  <div class="section">
    <h2>Works</h2>
    <div class="grid">
      <div class="card">Project 01</div>
      <div class="card">Project 02</div>
      <div class="card">Project 03</div>
    </div>
  </div>

  <div class="section">
    <h2>About</h2>
    <p>yasashi studio — breaking and rebuilding visual systems.</p>
  </div>

  <div class="footer">
    © 2026 yasashi studio
  </div>

</body>
</html>
